<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data KTP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="container">
    <h2>Aplikasi Manajemen Data KTP</h2>

    <div id="notifArea" class="notif" style="display: none;"></div>

    <div class="form-container">
        <form id="formKtp">
            <input type="hidden" id="ktpId">

            <div class="form-group">
                <label>Nomor KTP</label>
                <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit NIK" required>
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap" placeholder="Nama sesuai KTP" required>
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <input type="text" id="alamat" placeholder="Jalan, RT/RW, Desa" required>
            </div>

            <div class="form-group">
                <label>Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select id="jenisKelamin" required>
                    <option value="">-- Pilih Jenis Kelamin --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" id="btnSave" class="btn btn-primary">Simpan Data</button>
                <button type="button" id="btnCancel" class="btn btn-secondary" style="display: none;">Batal Edit</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table id="tableKtp">
            <thead>
            <tr>
                <th>No</th>
                <th>Nomor KTP</th>
                <th>Nama Lengkap</th>
                <th>Alamat</th>
                <th>Tanggal Lahir</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
